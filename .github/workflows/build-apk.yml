name: Сборка APK (СОКОЛ-87)

# Облачная сборка APK без локального Android SDK.
# Запускается вручную (вкладка Actions -> Build APK -> Run workflow)
# или автоматически при пуше в main.

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Установка Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Установка JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Android SDK
        uses: android-actions/setup-android@v3

      - name: Установка зависимостей
        run: npm install

      - name: Инициализация Capacitor (если нужно)
        run: |
          if [ ! -f capacitor.config.json ] && [ ! -f capacitor.config.ts ]; then
            npx cap init "СОКОЛ-87" com.celesteal.sokol87 --web-dir=www
          fi

      - name: Добавить платформу Android
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Синхронизация
        run: npx cap sync android

      - name: Установка иконки приложения
        run: |
          # раскладываем готовые PNG-иконки по mipmap-папкам
          declare -A M=( [mdpi]=48 [hdpi]=72 [xhdpi]=96 [xxhdpi]=144 [xxxhdpi]=192 )
          for d in "${!M[@]}"; do
            sz=${M[$d]}
            dir="android/app/src/main/res/mipmap-$d"
            mkdir -p "$dir"
            if [ -f "resources/ic_launcher-$d.png" ]; then
              cp "resources/ic_launcher-$d.png" "$dir/ic_launcher.png"
              cp "resources/ic_launcher-$d.png" "$dir/ic_launcher_round.png"
              cp "resources/ic_launcher-$d.png" "$dir/ic_launcher_foreground.png"
            fi
          done
          echo "Иконки установлены"

      - name: Патч манифеста (landscape/fullscreen)
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ] && ! grep -q 'screenOrientation' "$MANIFEST"; then
            sed -i 's/android:name="\.MainActivity"/android:name=".MainActivity"\n            android:screenOrientation="sensorLandscape"\n            android:keepScreenOn="true"/' "$MANIFEST"
          fi

      - name: Сборка debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Загрузка APK как артефакт
        uses: actions/upload-artifact@v4
        with:
          name: sokol87-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
